    <style>
        :root {
            --bg: #0f172a;

        .nav-btn-7 { background: #ef4444; border: none; color: white; padding: 8px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; cursor: pointer; }
        .nav-btn-6 { background: var(--water-deep); border: none; color: white; width: 36px; height: 36px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Encadrés Compteurs de consommation d'eau */
        .user-card { background: var(--card); border-radius: 16px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }

    <!-- OVERLAY ALERTE -->

<script>
    const SUPABASE_URL = "https://dbcxfskynfuwcbbgjlso.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_vcEj5jZ7UcrirwO4HglatQ_tgrbAg6n";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Identifiants d'envoi Webpushr (Clé API REST)
    const WEBPUSHR_KEY = "BGRWk6uWTGHG_kcWXJLWcTPkWEzJp53vzrwDcCWtezHDJUtTWIsFv0db4avZZmBk6vx2ji6kRYBPD0On2qf1sfs";
    const WEBPUSHR_AUTH_TOKEN = "73305"; // Ton Auth Token Webpushr pour autoriser l'envoi

    let currentUser = localStorage.getItem('water_user') || null;
    let targetUser = "";
    let currentReminderId = null; 
    
    const timeoffsets = { 'Clément': 2, 'Hoa': 7 };
    
    const defaultMessages = {
        'Clément': "Hey ! C'est l'heure de boire un grand verre d'eau ! 💧",
        'Hoa': "Đến lúc uống một cốc nước thật lớn rồi đó! 💧"
    };

    let appState = {
        goals: { 'Clément': 150, 'Hoa': 150 },
        allLogs: []
    };

    let chartDayInstance = null;
    let chartWeekClemInstance = null;
    let chartWeekHoaInstance = null;

    if (currentUser) showApp();

    function selectProfile(name) {
        currentUser = name;
        localStorage.setItem('water_user', name);
        showApp();
    }

    function showApp() {
        targetUser = (currentUser === "Clément") ? "Hoa" : "Clément";
        document.getElementById('profile-selection').style.display = 'none';
        switchView('main-view');
        applyTranslations();
        
        // Assigner l'identifiant personnalisé à l'appareil pour Webpushr
        if (typeof window.webpushr !== 'undefined') {
            window.webpushr('setup', { 'user_id': currentUser });
        }
        
        loadData();
        checkOfflineReminders(); 
        listenRealtime();
    }

    function switchView(viewId) {
        document.getElementById('main-view').style.display = (viewId === 'main-view') ? 'flex' : 'none';
        document.getElementById('data-view').style.display = (viewId === 'data-view') ? 'flex' : 'none';
        if(viewId === 'data-view') {
            setTimeout(renderCharts, 100);
        }
    }

    function logout() {
        localStorage.removeItem('water_user');
        window.location.href = window.location.origin + window.location.pathname;
    }

    function formatWater(cl) {
        if (cl < 0) cl = 0;
        return cl >= 100 ? (cl / 100).toFixed(2) + " L" : cl + " cL";
    }

    function applyTranslations() {
        const isHoa = (currentUser === "Phù" || currentUser === "Hoa"); // Supporte la détection propre
        const isActualHoa = (currentUser === "Hoa");
        document.getElementById('display-profile').innerText = isActualHoa ? `Hồ sơ: Hoa` : `Profil: Clément`;
        document.getElementById('btn-7').innerText = isActualHoa ? "Thay đổi" : "Changer";
        document.getElementById('main-action-text').innerText = isActualHoa ? "Nhắc người kia uống nước" : "Rappeler à l'autre de boire";
        
        document.getElementById('title-data-page').innerText = isActualHoa ? "Dữ liệu & Thống kê" : "Données & Statistiques";
        document.getElementById('lbl-goal-clem').innerText = isActualHoa ? "Mục tiêu Clément" : "Objectif Clément";
        document.getElementById('lbl-goal-hoa').innerText = isActualHoa ? "Mục tiêu Hoa" : "Objectif Hoa";
        document.getElementById('lbl-days-clem').innerText = isActualHoa ? "Số ngày hoàn thành" : "Jours complétés";
        document.getElementById('lbl-days-hoa').innerText = isActualHoa ? "Số ngày hoàn thành" : "Jours complétés";
        document.getElementById('btn-back-main').innerText = isActualHoa ? "⬅ Quay lại" : "⬅ Retour";
    }

    function getLocalDateStringFromOffset(offset) {
        const utc = new Date().getTime() + (new Date().getTimezoneOffset() * 60000);
        const localTime = new Date(utc + (3600000 * offset));
        return localTime.toISOString().split('T')[0];
    }

    async function loadData() {
        const { data: settings } = await supabaseClient.from('water_settings').select('*');
        if (settings) {
            settings.forEach(s => {
                appState.goals[s.user_name] = s.daily_goal_cl;
                document.getElementById(`val-goal-${s.user_name}`).innerText = formatWater(s.daily_goal_cl);
            });
        }

        const { data: logs } = await supabaseClient.from('water_logs').select('*').order('created_at', { ascending: true });
        appState.allLogs = logs || [];
        
        calculateRealtimeMetrics();
    }

    function calculateRealtimeMetrics() {
        const totals = { 'Clément': 0, 'Hoa': 0 };
        const dateStrClem = getLocalDateStringFromOffset(timeoffsets['Clément']);
        const dateStrHoa = getLocalDateStringFromOffset(timeoffsets['Hoa']);

        appState.allLogs.forEach(log => {
            const logUtc = new Date(log.created_at).getTime() + (new Date(log.created_at).getTimezoneOffset() * 60000);
            const userOffset = log.user_name === 'Clément' ? timeoffsets['Clément'] : timeoffsets['Hoa'];
            const logLocalDateStr = new Date(logUtc + (3600000 * userOffset)).toISOString().split('T')[0];
            
            if (log.user_name === 'Clément' && logLocalDateStr === dateStrClem) totals['Clément'] += log.amount_cl;
            if (log.user_name === 'Hoa' && logLocalDateStr === dateStrHoa) totals['Hoa'] += log.amount_cl;
        });

        ['Clément', 'Hoa'].forEach(user => {
            const total = Math.max(0, totals[user]);
            const goal = appState.goals[user];
            const pct = Math.min(100, Math.round((total / goal) * 100));

            document.getElementById(`vol-${user}`).innerText = formatWater(total);
            document.getElementById(`pct-${user}`).innerText = `(${pct}%)`;
            document.getElementById(`glass-fill-${user}`).style.height = `${pct}%`;
        });

        calculateStreaks();
    }

    function calculateStreaks() {
        const dailyAggregates = { 'Clément': {}, 'Hoa': {} };

        appState.allLogs.forEach(log => {
            const logUtc = new Date(log.created_at).getTime() + (new Date(log.created_at).getTimezoneOffset() * 60000);
            const userOffset = timeoffsets[log.user_name];
            const logLocalDateStr = new Date(logUtc + (3600000 * userOffset)).toISOString().split('T')[0];
            
            if (!dailyAggregates[log.user_name][logLocalDateStr]) dailyAggregates[log.user_name][logLocalDateStr] = 0;
            dailyAggregates[log.user_name][logLocalDateStr] += log.amount_cl;
        });

        ['Clément', 'Hoa'].forEach(user => {
            let userDaysSuccess = 0;
            Object.keys(dailyAggregates[user]).forEach(dateKey => {
                if (dailyAggregates[user][dateKey] >= appState.goals[user]) {
                    userDaysSuccess++;
                }
            });
            document.getElementById(`streak-${user}`).innerText = `${userDaysSuccess} ${currentUser === 'Hoa' ? 'ngày' : 'j'}`;
        });
    }

    async function logWater(amount) {
        const { error } = await supabaseClient.from('water_logs').insert([{
            user_name: currentUser,
            amount_cl: amount,
            timezone: currentUser === 'Clément' ? 'Europe/Paris' : 'Asia/Ho_Chi_Minh'
         }]);

        if (!error) {
            const toast = document.getElementById('toast');
            toast.innerText = currentUser === 'Hoa' ? "Đã ghi nhận! 👍" : "Enregistré ! 👍";
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 1800);
            loadData();
        }
    }

    async function changeGoal(user) {
        const promptMsg = currentUser === 'Hoa' ? `Mục tiêu mới cho ${user} (cL):` : `Nouvel objectif pour ${user} (en cL) :`;
        const newGoal = prompt(promptMsg, appState.goals[user]);
        if (newGoal && !isNaN(newGoal)) {
            const { error } = await supabaseClient.from('water_settings').upsert({
                user_name: user,
                daily_goal_cl: parseInt(newGoal)
            });
            if (!error) loadData();
        }
    }

    async function sendWaterReminder() {
        const isHoa = (currentUser === 'Hoa');
        const promptTitle = isHoa ? "Nhập tin nhắn của bạn:" : "Écris ton message personnalisé :";
        
        let customMsg = prompt(promptTitle, "");
        if (customMsg === null) return; 
        
        customMsg = customMsg.trim();
        if (customMsg === "") {
            customMsg = defaultMessages[targetUser];
        }
        
        // 1. Enregistrement classique dans Supabase pour votre historique/vue in-app
        await supabaseClient.from('water_reminders').insert([{ 
            sender: currentUser,
            message: customMsg
        }]);

        // 2. ENVOI DE LA VRAIE NOTIFICATION NATIVE VIA WEBPUSHR
        try {
            await fetch('https://api.webpushr.com/v1/notification/send/sid', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'webpushrKey': WEBPUSHR_KEY,
                    'webpushrAuthToken': WEBPUSHR_AUTH_TOKEN
                },
                body: JSON.stringify({
                    "title": currentUser === 'Hoa' ? `Lời nhắc từ Hoa! 💧` : `Rappel de Clément ! 💧`,
                    "message": customMsg,
                    "target_sid": targetUser, // Cible l'appareil tagué du prénom opposé
                    "icon": "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230f172a'/><text y='50%' x='50%' dominant-baseline='middle' text-anchor='middle' font-size='55'>💧</text></svg>"
                })
            });
        } catch (e) {
            console.error("Erreur d'envoi de la notification Webpushr", e);
        }

        const toast = document.getElementById('toast');
        toast.innerText = isHoa ? "Đã gửi nhắc nhở! ✉️" : "Rappel envoyé ! ✉️";
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 1500);
    }

    async function checkOfflineReminders() {
        const { data: latestReminders, error } = await supabaseClient
            .from('water_reminders')
            .select('*')
            .eq('sender', targetUser)
            .order('id', { ascending: false })
            .limit(1);

        if (!error && latestReminders && latestReminders.length > 0) {
            const lastReminder = latestReminders[0];
            const lastSeenId = localStorage.getItem(`water_last_seen_reminder_${currentUser}`);

            if (!lastSeenId || parseInt(lastSeenId) < lastReminder.id) {
                currentReminderId = lastReminder.id;
                triggerAlert(lastReminder.message);
            }
        }
    }

    function listenRealtime() {
        supabaseClient.channel('water-logs-channel').on('postgres_changes', {
            event: 'INSERT', pattern: 'public', table: 'water_logs'
        }, () => { loadData(); }).subscribe();

        supabaseClient.channel('water-settings-channel').on('postgres_changes', {
            event: '*', pattern: 'public', table: 'water_settings'
        }, () => { loadData(); }).subscribe();

        supabaseClient.channel('water-reminders-channel').on('postgres_changes', {
            event: 'INSERT', pattern: 'public', table: 'water_reminders'
        }, payload => {
            if (payload.new.sender === targetUser) {
                currentReminderId = payload.new.id;
                triggerAlert(payload.new.message || "");
            }
        }).subscribe();
    }

    function triggerAlert(customText) {
        document.getElementById('alert-message').innerHTML = customText;
        document.getElementById('alert-overlay').style.display = 'flex';
        try { document.getElementById('water-sound').play(); } catch(e){}
    }

    function dismissAlert() {
        if (currentReminderId) {
            localStorage.setItem(`water_last_seen_reminder_${currentUser}`, currentReminderId);
        }
        document.getElementById('alert-overlay').style.display = 'none';
    }

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible" && currentUser) {
            checkOfflineReminders();
        }
    });

    function renderCharts() {
        const isHoa = (currentUser === 'Hoa');
        
        if(chartDayInstance) chartDayInstance.destroy();
        if(chartWeekClemInstance) chartWeekClemInstance.destroy();
        if(chartWeekHoaInstance) chartWeekHoaInstance.destroy();

        const halfHoursLabels = [];
        for (let h = 0; h < 24; h++) {
            halfHoursLabels.push(`${h}h00`);
            halfHoursLabels.push(`${h}h30`);
        }
        
        const slotsClem = Array(48).fill(0);
        const slotsHoa = Array(48).fill(0);

        const dateStrClem = getLocalDateStringFromOffset(timeoffsets['Clément']);
        const dateStrHoa = getLocalDateStringFromOffset(timeoffsets['Hoa']);

        appState.allLogs.forEach(log => {
            const logUtc = new Date(log.created_at).getTime() + (new Date(log.created_at).getTimezoneOffset() * 60000);
            const userOffset = log.user_name === 'Clément' ? timeoffsets['Clément'] : timeoffsets['Hoa'];
            const localDate = new Date(logUtc + (3600000 * userOffset));
            const logLocalDateStr = localDate.toISOString().split('T')[0];
            
            const hours = localDate.getHours();
            const minutes = localDate.getMinutes();
            const slotIdx = (hours * 2) + (minutes >= 30 ? 1 : 0);

            if (slotIdx >= 0 && slotIdx < 48) {
                if (log.user_name === 'Clément' && logLocalDateStr === dateStrClem) slotsClem[slotIdx] += log.amount_cl;
                if (log.user_name === 'Hoa' && logLocalDateStr === dateStrHoa) slotsHoa[slotIdx] += log.amount_cl;
            }
        });

        let cumClem = 0, cumHoa = 0;
        const cumulativeClem = slotsClem.map(v => { cumClem += v; return Math.max(0, cumClem); });
        const cumulativeHoa = slotsHoa.map(v => { cumHoa += v; return Math.max(0, cumHoa); });

        const ctxDay = document.getElementById('dayChart').getContext('2d');
        chartDayInstance = new Chart(ctxDay, {
            type: 'line',
            data: {
                labels: halfHoursLabels,
                datasets: [
                    { label: 'Clément (cL)', data: cumulativeClem, borderColor: '#38bdf8', backgroundColor: 'transparent', tension: 0.1, fill: false, borderWidth: 2, pointRadius: 1 },
                    { label: 'Hoa (cL)', data: cumulativeHoa, borderColor: '#f43f5e', backgroundColor: 'transparent', tension: 0.1, fill: false, borderWidth: 2, pointRadius: 1 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    title: { display: true, text: isHoa ? 'Tiến trình hôm nay' : 'Progression de la journée', color: '#fff' }, 
                    legend: { labels: { color: '#fff', boxWidth: 15, boxHeight: 2 } }
                },
                scales: { 
                    x: { ticks: { color: '#94a3b8', maxTicksLimit: 12, font: { size: 9 } } }, 
                    y: { ticks: { color: '#94a3b8' } } 
                }
            }
        });

        const last7DaysLabels = [];
        const weeklyDataClem = Array(7).fill(0);
        const weeklyDataHoa = Array(7).fill(0);

        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            last7DaysLabels.push(d.toLocaleDateString(isHoa ? 'vi-VN' : 'fr-FR', { weekday: 'short', day: 'numeric' }));
        }

        appState.allLogs.forEach(log => {
            const logUtc = new Date(log.created_at).getTime() + (new Date(log.created_at).getTimezoneOffset() * 60000);
            const userOffset = timeoffsets[log.user_name];
            const logDate = new Date(logUtc + (3600000 * userOffset));
            
            const todayLocal = new Date(new Date().getTime() + (new Date().getTimezoneOffset() * 60000) + (3600000 * userOffset));
            todayLocal.setHours(0,0,0,0);
            logDate.setHours(0,0,0,0);
            
            const diffTime = todayLocal - logDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays < 7 && diffDays >= 0) {
                const index = 6 - diffDays;
                if (index >= 0 && index < 7) {
                    if (log.user_name === 'Clément') weeklyDataClem[index] += log.amount_cl;
                    if (log.user_name === 'Hoa') weeklyDataHoa[index] += log.amount_cl;
                }
            }
        });

        const ctxWeekClem = document.getElementById('weekChartClem').getContext('2d');
        chartWeekClemInstance = new Chart(ctxWeekClem, {
            type: 'bar',
            data: {
                labels: last7DaysLabels,
                datasets: [{ label: 'Clem (cL)', data: weeklyDataClem.map(v => Math.max(0, v)), backgroundColor: '#38bdf8' }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { title: { display: true, text: isHoa ? 'Tuần Clément' : 'Semaine Clément', color: '#fff' }, legend: { display: false } },
                scales: { x: { ticks: { color: '#94a3b8', font: { size: 10 } } }, y: { ticks: { color: '#94a3b8' } } }
            }
        });

        const ctxWeekHoa = document.getElementById('weekChartHoa').getContext('2d');
        chartWeekHoaInstance = new Chart(ctxWeekHoa, {
            type: 'bar',
            data: {
                labels: last7DaysLabels,
                datasets: [{ label: 'Hoa (cL)', data: weeklyDataHoa.map(v => Math.max(0, v)), backgroundColor: '#f43f5e' }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { title: { display: true, text: isHoa ? 'Tuần Hoa' : 'Semaine Hoa', color: '#fff' }, legend: { display: false } },
                scales: { x: { ticks: { color: '#94a3b8', font: { size: 10 } } }, y: { ticks: { color: '#94a3b8' } } }
            }
        });
    }
</script>
