<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💧 Drink Water Pro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">

    <!-- Supabase & Chart.js Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --water: #38bdf8;
            --water-deep: #0284c7;
            --text: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* Écran Sélection Profil */
        #profile-selection { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; height: 100vh; padding: 20px; }
        .profile-btn { background: var(--card); border: 2px solid var(--card); color: var(--text); padding: 20px; font-size: 1.3rem; font-weight: bold; border-radius: 16px; cursor: pointer; width: 260px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); transition: 0.2s; }
        .profile-btn:active { transform: scale(0.95); border-color: var(--water); }

        /* Vues principales */
        .app-view { display: none; flex-direction: column; width: 100%; min-height: 100vh; padding: 15px; box-sizing: border-box; }
        
        /* Navbar Supérieure */
        .nav-bar { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 12px 15px; border-radius: 14px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-btn-7 { background: #ef4444; border: none; color: white; padding: 8px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; cursor: pointer; }
        .nav-btn-6 { background: var(--water-deep); border: none; color: white; width: 36px; height: 36px; border-radius: 50%; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Encadrés 2 & 3 (Compteurs de consommation d'eau) */
        .user-card { background: var(--card); border-radius: 16px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }
        .glass-container { width: 65px; height: 95px; border: 3px solid var(--text); border-top: none; border-radius: 0 0 12px 12px; position: relative; overflow: hidden; background: rgba(255,255,255,0.05); }
        .glass-water { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, var(--water-deep), var(--water)); transition: height 0.5s ease-out; height: 0%; }
        .card-info { flex-grow: 1; font-size: 1.1rem; }
        .card-info .name { font-weight: bold; color: var(--water); font-size: 1.2rem; }
        .card-info .stats { margin-top: 4px; font-size: 1.3rem; font-weight: bold; }
        .card-info .percentage { font-size: 0.95rem; color: var(--text-secondary); margin-left: 5px; }

        /* Gros bouton central 1 */
        .center-action { flex-grow: 1; display: flex; justify-content: center; align-items: center; margin: 20px 0; }
        .main-btn-1 { width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, var(--water), var(--water-deep)); border: none; color: white; font-size: 3.5rem; cursor: pointer; box-shadow: 0 0 25px rgba(56,189,248,0.4); position: relative; transition: transform 0.1s; }
        .main-btn-1:active { transform: scale(0.92); }
        
        /* Boutons d'ajustement bas 4 & 5 */
        .bottom-actions { display: flex; justify-content: space-between; width: 100%; padding: 0 10px; }
        .adjust-btn { width: 60px; height: 60px; border-radius: 14px; border: none; font-size: 1.6rem; font-weight: bold; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-4-add { background: #22c55e; }
        .btn-5-rem { background: #ea580c; }

        /* --- PAGE DE DATA (image_1360ab.png) --- */
        .data-grid-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .data-box { background: var(--card); padding: 12px; border-radius: 12px; flex: 1; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .data-box-title { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        .data-box-value { font-size: 1.4rem; font-weight: bold; color: var(--water); }
        .chart-container-large { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: 220px; }
        .charts-flex-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .chart-container-small { background: var(--card); padding: 10px; border-radius: 12px; flex: 1; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: 160px; }
        .btn-back { background: var(--card); border: 1px solid var(--text-secondary); color: var(--text); padding: 12px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }

        /* Overlay d'alerte */
        #alert-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.95); z-index: 100; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .alert-box { background: var(--card); border: 3px solid var(--water); padding: 35px 25px; border-radius: 24px; max-width: 90%; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .got-it-btn { background: var(--water); color: #000; border: none; padding: 12px 30px; font-size: 1.1rem; font-weight: bold; border-radius: 12px; margin-top: 20px; cursor: pointer; width: 100%; }
        #toast { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); background: #22c55e; color: white; padding: 10px 20px; border-radius: 20px; font-weight: bold; opacity: 0; transition: opacity 0.3s; z-index: 50; pointer-events: none; }
    </style>
</head>
<body>

    <!-- ÉCRAN CHOIX DU PROFIL -->
    <div id="profile-selection">
        <h1 style="color:var(--water); margin-bottom:5px;">💧 Drink Water</h1>
        <p style="color:var(--text-secondary); margin-bottom:20px;">Sélectionnez votre profil / Chọn hồ sơ</p>
        <button class="profile-btn" onclick="selectProfile('Clément')">👨‍💻 Clément</button>
        <button class="profile-btn" onclick="selectProfile('Hoa')">👩‍⚕️ Hoa</button>
    </div>

    <!-- ÉCRAN PRINCIPAL (image_0964be.png) -->
    <div id="main-view" class="app-view">
        <div class="nav-bar">
            <!-- Bouton 7 -->
            <button id="btn-7" class="nav-btn-7" onclick="logout()">Changer</button>
            <div style="font-weight: bold;" id="display-profile">...</div>
            <!-- Bouton 6 -->
            <button id="btn-6" class="nav-btn-6" onclick="switchView('data-view')">📊</button>
        </div>

        <!-- Encadré 2 (Clément) -->
        <div class="user-card" id="card-clement">
            <div class="glass-container"><div id="glass-fill-Clément" class="glass-water"></div></div>
            <div class="card-info">
                <div class="name">Clément</div>
                <div class="stats"><span id="vol-Clément">0 cL</span><span id="pct-Clément" class="percentage">(0%)</span></div>
            </div>
        </div>

        <!-- Encadré 3 (Hoa) -->
        <div class="user-card" id="card-hoa">
            <div class="glass-container"><div id="glass-fill-Hoa" class="glass-water"></div></div>
            <div class="card-info">
                <div class="name">Hoa</div>
                <div class="stats"><span id="vol-Hoa">0 cL</span><span id="pct-Hoa" class="percentage">(0%)</span></div>
            </div>
        </div>

        <!-- Gros bouton 1 -->
        <div class="center-action">
            <button class="main-btn-1" onclick="sendWaterReminder()">📣</button>
        </div>

        <!-- Boutons d'ajustement bas 4 & 5 -->
        <div class="bottom-actions">
            <button class="adjust-btn btn-4-add" onclick="logWater(25)">+25</button>
            <button class="adjust-btn btn-5-rem" onclick="logWater(-25)">-25</button>
        </div>
    </div>

    <!-- ÉCRAN DATA (image_1360ab.png) -->
    <div id="data-view" class="app-view">
        <div class="nav-bar">
            <div style="font-weight:bold;" id="title-data-page">Données & Statistiques</div>
            <div></div>
        </div>

        <!-- Boutons de modification d'objectifs 8 & 9 -->
        <div class="data-grid-row">
            <div class="data-box" onclick="changeGoal('Clément')" style="cursor:pointer; border: 1px solid rgba(255,255,255,0.1);">
                <div class="data-box-title" id="lbl-goal-clem">Objectif Clément (8)</div>
                <div class="data-box-value" id="val-goal-Clément">1.5 L</div>
            </div>
            <div class="data-box" onclick="changeGoal('Hoa')" style="cursor:pointer; border: 1px solid rgba(255,255,255,0.1);">
                <div class="data-box-title" id="lbl-goal-hoa">Objectif Hoa (9)</div>
                <div class="data-box-value" id="val-goal-Hoa">1.5 L</div>
            </div>
        </div>

        <!-- Nombre de jours validés 10 & 11 -->
        <div class="data-grid-row">
            <div class="data-box">
                <div class="data-box-title" id="lbl-days-clem">Jours complétés (10)</div>
                <div class="data-box-value" id="streak-Clément">0 d</div>
            </div>
            <div class="data-box">
                <div class="data-box-title" id="lbl-days-hoa">Jours complétés (11)</div>
                <div class="data-box-value" id="streak-Hoa">0 d</div>
            </div>
        </div>

        <!-- Graphique unique Journée 12 & 13 (2 courbes) -->
        <div class="chart-container-large">
            <canvas id="dayChart"></canvas>
        </div>

        <!-- Graphiques de la Semaine 14 & 15 -->
        <div class="charts-flex-row">
            <div class="chart-container-small">
                <canvas id="weekChartClem"></canvas>
            </div>
            <div class="chart-container-small">
                <canvas id="weekChartHoa"></canvas>
            </div>
        </div>

        <button class="btn-back" id="btn-back-main" onclick="switchView('main-view')">⬅ Retour</button>
    </div>

    <!-- OVERLAY ALERTE RAPPEL -->
    <div id="alert-overlay">
        <div class="alert-box">
            <h2 id="alert-title-text" style="font-size:2rem; margin:0 0 10px 0; color:var(--water);">🌊 BOIS DE L'EAU !</h2>
            <p id="alert-message" style="font-size: 1.1rem; line-height: 1.4; margin:0;"></p>
            <button id="btn-dismiss" class="got-it-btn" onclick="dismissAlert()">C'est fait ! 👍</button>
        </div>
    </div>

    <div id="toast">Enregistré ! 👍</div>
    <audio id="water-sound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav" preload="auto"></audio>

<script>
    // ==========================================
    // CONFIGURATION SUPABASE METTANT EN OEUVRE LA CLÉ PUBLIEE
    // ==========================================
    const SUPABASE_URL = "https://dbcxfskynfuwcbbgjlso.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_vcEj5jZ7UcrirwO4HglatQ_tgrbAg6n";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = localStorage.getItem('water_user') || null;
    let targetUser = "";
    
    // Fuseaux horaires assignés
    const timezones = { 'Clément': 'Europe/Paris', 'Hoa': 'Asia/Ho_Chi_Minh' };
    
    // Variables globales d'état de l'application
    let appState = {
        goals: { 'Clément': 150, 'Hoa': 150 },
        todayLogs: [],
        allLogs: []
    };

    // Instances des graphiques Chart.js
    let chartDayInstance = null;
    let chartWeekClemInstance = null;
    let chartWeekHoaInstance = null;

    if (currentUser) showApp();

    function selectProfile(name) {
        currentUser = name;
        localStorage.setItem('water_user', name);
        showApp();
    }

    function showApp() {
        targetUser = (currentUser === "Clément") ? "Hoa" : "Clément";
        document.getElementById('profile-selection').style.display = 'none';
        switchView('main-view');
        applyTranslations();
        
        // Chargement initial des données et écoute Realtime
        loadData();
        listenRealtime();
    }

    function switchView(viewId) {
        document.getElementById('main-view').style.display = (viewId === 'main-view') ? 'flex' : 'none';
        document.getElementById('data-view').style.display = (viewId === 'data-view') ? 'flex' : 'none';
        if(viewId === 'data-view') {
            setTimeout(renderCharts, 100); // Laisse le conteneur s'afficher avant de dessiner les graphiques
        }
    }

    function logout() {
        localStorage.removeItem('water_user');
        window.location.href = window.location.origin + window.location.pathname;
    }

    // Convertit les cl au format lisible L ou cl selon la règle définie
    function formatWater(cl) {
        if (cl < 0) cl = 0;
        return cl >= 100 ? (cl / 100).toFixed(2) + " L" : cl + " cL";
    }

    function applyTranslations() {
        const isHoa = (currentUser === "Hoa");
        document.getElementById('display-profile').innerText = isHoa ? `Hồ sơ: Hoa` : `Profil: Clément`;
        document.getElementById('btn-7').innerText = isHoa ? "Thay đổi" : "Changer";
        
        // Traductions Écran de Data
        document.getElementById('title-data-page').innerText = isHoa ? "Dữ liệu & Thống kê" : "Données & Statistiques";
        document.getElementById('lbl-goal-clem').innerText = isHoa ? "Mục tiêu Clément (8)" : "Objectif Clément (8)";
        document.getElementById('lbl-goal-hoa').innerText = isHoa ? "Mục tiêu Hoa (9)" : "Objectif Hoa (9)";
        document.getElementById('lbl-days-clem').innerText = isHoa ? "Số ngày hoàn thành (10)" : "Jours complétés (10)";
        document.getElementById('lbl-days-hoa').innerText = isHoa ? "Số ngày hoàn thành (11)" : "Jours complétés (11)";
        document.getElementById('btn-back-main').innerText = isHoa ? "⬅ Quay lại" : "⬅ Retour";
        document.getElementById('alert-title-text').innerText = isHoa ? "🌊 UỐNG NƯỚC ĐI !" : "🌊 BOIS DE L'EAU !";
        document.getElementById('btn-dismiss').innerText = isHoa ? "Đã xong! 👍" : "C'est fait ! 👍";
    }

    // Récupère la date "Aujourd'hui" calée sur le fuseau horaire spécifique de l'utilisateur
    function getLocalDateString(tz) {
        const d = new Date();
        return new Intl.DateTimeFormat('en-CA', { timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit' }).format(d);
    }

    async function loadData() {
        // 1. Récupération des objectifs configurés (water_settings)
        const { data: settings } = await supabaseClient.from('water_settings').select('*');
        if (settings) {
            settings.forEach(s => {
                appState.goals[s.user_name] = s.daily_goal_cl;
                document.getElementById(`val-goal-${s.user_name}`).innerText = formatWater(s.daily_goal_cl);
            });
        }

        // 2. Récupération complète de l'historique de consommation (water_logs)
        const { data: logs } = await supabaseClient.from('water_logs').select('*').order('created_at', { ascending: true });
        appState.allLogs = logs || [];
        
        calculateRealtimeMetrics();
    }

    function calculateRealtimeMetrics() {
        const totals = { 'Clément': 0, 'Hoa': 0 };
        const dateStrClem = getLocalDateString(timezones['Clément']);
        const dateStrHoa = getLocalDateString(timezones['Hoa']);

        // Calcul de la quantité bue aujourd'hui selon le fuseau respectif de chacun
        appState.allLogs.forEach(log => {
            const logDateStr = new Intl.DateTimeFormat('en-CA', { timeZone: log.timezone, year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date(log.created_at));
            
            if (log.user_name === 'Clément' && logDateStr === dateStrClem) totals['Clément'] += log.amount_cl;
            if (log.user_name === 'Hoa' && logDateStr === dateStrHoa) totals['Hoa'] += log.amount_cl;
        });

        // Mise à jour visuelle des compteurs et des verres d'eau
        ['Clément', 'Hoa'].forEach(user => {
            const total = Math.max(0, totals[user]);
            const goal = appState.goals[user];
            const pct = Math.min(100, Math.round((total / goal) * 100));

            document.getElementById(`vol-${user}`).innerText = formatWater(total);
            document.getElementById(`pct-${user}`).innerText = `(${pct}%)`;
            document.getElementById(`glass-fill-${user}`).style.height = `${pct}%`;
        });

        // Calcul du nombre de jours où l'objectif a été complété (Streaks)
        calculateStreaks();
    }

    function calculateStreaks() {
        const streaks = { 'Clément': 0, 'Hoa': 0 };
        const dailyAggregates = {}; // Structure: { 'Clément': { '2026-05-15': total_cl }, ... }

        appState.allLogs.forEach(log => {
            const logDateStr = new Intl.DateTimeFormat('en-CA', { timeZone: log.timezone, year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date(log.created_at));
            if (!dailyAggregates[log.user_name]) dailyAggregates[log.user_name] = {};
            if (!dailyAggregates[log.user_name][logDateStr]) dailyAggregates[log.user_name][logDateStr] = 0;
            dailyAggregates[log.user_name][logDateStr] += log.amount_cl;
        });

        ['Clément', 'Hoa'].forEach(user => {
            let userDaysSuccess = 0;
            if (dailyAggregates[user]) {
                Object.keys(dailyAggregates[user]).forEach(dateKey => {
                    if (dailyAggregates[user][dateKey] >= appState.goals[user]) {
                        userDaysSuccess++;
                    }
                });
            }
            streaks[user] = userDaysSuccess;
            document.getElementById(`streak-${user}`).innerText = `${userDaysSuccess} j`;
        });
    }

    // Insertion d'un enregistrement d'eau (Ajout/Retrait boutons 4 & 5)
    async function logWater(amount) {
        const userTz = timezones[currentUser];
        const { error } = await supabaseClient.from('water_logs').insert([{
            user_name: currentUser,
            amount_cl: amount,
            timezone: userTz
        }]);

        if (!error) {
            const toast = document.getElementById('toast');
            toast.innerText = currentUser === 'Hoa' ? "Đã ghi nhận! 👍" : "Enregistré ! 👍";
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 1800);
            loadData();
        }
    }

    // Modification d'un objectif de consommation journalière (Boutons 8 & 9)
    async function changeGoal(user) {
        const promptMsg = currentUser === 'Hoa' ? `Mục tiêu mới cho ${user} (cL):` : `Nouvel objectif pour ${user} (en cL) :`;
        const newGoal = prompt(promptMsg, appState.goals[user]);
        if (newGoal && !isNaN(newGoal)) {
            const { error } = await supabaseClient.from('water_settings').upsert({
                user_name: user,
                daily_goal_cl: parseInt(newGoal)
            });
            if (!error) loadData();
        }
    }

    // Bouton de rappel central 1
    async function sendWaterReminder() {
        await supabaseClient.from('water_reminders').insert([{ sender: currentUser }]);
    }

    function listenRealtime() {
        // Écoute des ajouts d'eau
        supabaseClient.channel('water-logs-channel').on('postgres_changes', {
            event: 'INSERT', pattern: 'public', table: 'water_logs'
        }, () => { loadData(); }).subscribe();

        // Écoute des changements de paramètres d'objectifs
        supabaseClient.channel('water-settings-channel').on('postgres_changes', {
            event: '*', pattern: 'public', table: 'water_settings'
        }, () => { loadData(); }).subscribe();

        // Écoute des demandes de rappels d'eau instantanés
        supabaseClient.channel('water-reminders-channel').on('postgres_changes', {
            event: 'INSERT', pattern: 'public', table: 'water_reminders'
        }, payload => {
            if (payload.new.sender === targetUser) {
                triggerAlert(payload.new.sender);
            }
        }).subscribe();
    }

    function triggerAlert(sender) {
        if (currentUser === "Hoa") {
            document.getElementById('alert-message').innerHTML = `<b>${sender}</b> nhắc bạn rằng đã đến lúc phải uống nước ngay lập tức!`;
        } else {
            document.getElementById('alert-message').innerHTML = `<b>${sender}</b> te rappelle qu'il est temps de t'hydrater immédiatement !`;
        }
        document.getElementById('alert-overlay').style.display = 'flex';
        try { document.getElementById('water-sound').play(); } catch(e){}
    }

    function dismissAlert() {
        document.getElementById('alert-overlay').style.display = 'none';
    }

    // --- CONSTRUCTION ET RENDU DES GRAPHIQUES (Chart.js) ---
    function renderCharts() {
        const isHoa = (currentUser === 'Hoa');
        
        // Destruction des instances existantes pour éviter la superposition de canvas
        if(chartDayInstance) chartDayInstance.destroy();
        if(chartWeekClemInstance) chartWeekClemInstance.destroy();
        if(chartWeekHoaInstance) chartWeekHoaInstance.destroy();

        // --- 1. Préparation du Graphique de la Journée 12 & 13 (2 courbes cumulées sur 24 heures) ---
        const hoursLabels = Array.from({length: 24}, (_, i) => `${i}h`);
        const hourlyClem = Array(24).fill(0);
        const hourlyHoa = Array(24).fill(0);

        const dateStrClem = getLocalDateString(timezones['Clément']);
        const dateStrHoa = getLocalDateString(timezones['Hoa']);

        appState.allLogs.forEach(log => {
            const logDate = new Date(log.created_at);
            const logDateStr = new Intl.DateTimeFormat('en-CA', { timeZone: log.timezone, year: 'numeric', month: '2-digit', day: '2-digit' }).format(logDate);
            const formatterHour = new Intl.DateTimeFormat('fr-FR', { timeZone: log.timezone, hour: 'numeric', hour12: false });
            const logHour = parseInt(formatterHour.format(logDate));

            if (log.user_name === 'Clément' && logDateStr === dateStrClem) hourlyClem[logHour] += log.amount_cl;
            if (log.user_name === 'Hoa' && logDateStr === dateStrHoa) hourlyHoa[logHour] += log.amount_cl;
        });

        // Transformation en courbes cumulatives au fil des heures de la journée
        let cumClem = 0, cumHoa = 0;
        const cumulativeClem = hourlyClem.map(v => { cumClem += v; return Math.max(0, cumClem); });
        const cumulativeHoa = hourlyHoa.map(v => { cumHoa += v; return Math.max(0, cumHoa); });

        const ctxDay = document.getElementById('dayChart').getContext('2d');
        chartDayInstance = new Chart(ctxDay, {
            type: 'line',
            data: {
                labels: hoursLabels,
                datasets: [
                    { label: 'Clément (cL)', data: cumulativeClem, borderColor: '#38bdf8', backgroundColor: 'rgba(56,189,248,0.1)', tension: 0.2, fill: true },
                    { label: 'Hoa (cL)', data: cumulativeHoa, borderColor: '#f43f5e', backgroundColor: 'rgba(244,63,94,0.1)', tension: 0.2, fill: true }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { title: { display: true, text: isHoa ? 'Tiến trình hôm nay (12-13)' : 'Progression de la journée (12-13)', color: '#fff' }, legend: { labels: { color: '#fff' } } },
                scales: { x: { ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' } } }
            }
        });

        // --- 2. Préparation des Graphiques de la Semaine 14 & 15 (Barres par jours glissants) ---
        const last7DaysLabels = [];
        const weeklyDataClem = Array(7).fill(0);
        const weeklyDataHoa = Array(7).fill(0);

        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            last7DaysLabels.push(d.toLocaleDateString(isHoa ? 'vi-VN' : 'fr-FR', { weekday: 'short', day: 'numeric' }));
        }

        appState.allLogs.forEach(log => {
            const logDate = new Date(log.created_at);
            const diffTime = Math.abs(new Date() - logDate);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays < 7) {
                const index = 6 - diffDays;
                if (index >= 0 && index < 7) {
                    if (log.user_name === 'Clément') weeklyDataClem[index] += log.amount_cl;
                    if (log.user_name === 'Hoa') weeklyDataHoa[index] += log.amount_cl;
                }
            }
        });

        // Graphique Hebdomadaire Clément (14)
        const ctxWeekClem = document.getElementById('weekChartClem').getContext('2d');
        chartWeekClemInstance = new Chart(ctxWeekClem, {
            type: 'bar',
            data: {
                labels: last7DaysLabels,
                datasets: [{ label: 'Clem (cL)', data: weeklyDataClem.map(v => Math.max(0, v)), backgroundColor: '#38bdf8' }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { title: { display: true, text: isHoa ? 'Tuần Clément (14)' : 'Semaine Clem (14)', color: '#fff' }, legend: { display: false } },
                scales: { x: { ticks: { color: '#94a3b8', font: { size: 9 } } }, y: { ticks: { color: '#94a3b8' } } }
            }
        });

        // Graphique Hebdomadaire Hoa (15)
        const ctxWeekHoa = document.getElementById('weekChartHoa').getContext('2d');
        chartWeekHoaInstance = new Chart(ctxWeekHoa, {
            type: 'bar',
            data: {
                labels: last7DaysLabels,
                datasets: [{ label: 'Hoa (cL)', data: weeklyDataHoa.map(v => Math.max(0, v)), backgroundColor: '#f43f5e' }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { title: { display: true, text: isHoa ? 'Tuần Hoa (15)' : 'Semaine Hoa (15)', color: '#fff' }, legend: { display: false } },
                scales: { x: { ticks: { color: '#94a3b8', font: { size: 9 } } }, y: { ticks: { color: '#94a3b8' } } }
            }
        });
    }
</script>
</body>
</html>
